workflows:
  ios-capacitor-build:
    name: iOS Capacitor Build
    max_build_duration: 60

    environment:
      node: latest
      xcode: latest

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Build Vite app
        script: |
          npm run build

      - name: Sync Capacitor
        script: |
          npx cap sync ios

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - matissouph@gmail.com
