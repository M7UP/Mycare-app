workflows:
  ios-sideload:
    name: iOS IPA (No signing)
    environment:
      xcode: latest
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Vite app
        script: npm run build
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Build unsigned IPA
        script: |
          xcodebuild -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE=""
          # Package into IPA
          mkdir -p output
          cp -r build/Build/Products/Release-iphoneos/App.app output/
          cd output && zip -r App.ipa App.app
    artifacts:
      - output/App.ipa
