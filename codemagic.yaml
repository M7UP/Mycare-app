workflows:
  ios-sideload:
    name: iOS IPA (No signing)
    environment:
      xcode: latest
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Vite app
        script: npm run build
      - name: Verify project path
        script: ls ios/App/
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Verify web files copied
        script: |
          echo "=== dist folder ==="
          ls dist/ || echo "dist/ not found at root"
          echo "=== public folder ==="
          ls ios/App/App/public/ || echo "public/ is empty or missing"
      - name: Build unsigned IPA
        script: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE=""
      
          mkdir -p output/Payload
          cp -r build/Build/Products/Release-iphoneos/App.app output/Payload/
          cd output && zip -r App.ipa Payload
    artifacts:
      - output/App.ipa
